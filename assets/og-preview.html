<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body {
  width: 1200px;
  height: 630px;
  background: #05080f;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: Arial, sans-serif;
  overflow: hidden;
  position: relative;
}
.bg-glow {
  position: absolute;
  width: 600px;
  height: 600px;
  background: radial-gradient(circle, rgba(56,189,248,0.12) 0%, transparent 70%);
  top: 50%;
  left: 50%;
  transform: translate(-50%,-50%);
}
.content {
  text-align: center;
  z-index: 1;
}
.brand {
  font-size: 72px;
  font-weight: 900;
  color: #fff;
  letter-spacing: 8px;
  margin-bottom: 8px;
}
.brand span { color: #38bdf8; }
.tagline {
  font-size: 28px;
  color: #8ab0c0;
  letter-spacing: 4px;
  margin-bottom: 32px;
  font-style: italic;
}
.pills {
  display: flex;
  gap: 16px;
  justify-content: center;
  margin-bottom: 32px;
}
.pill {
  background: rgba(56,189,248,0.1);
  border: 1px solid rgba(56,189,248,0.3);
  color: #38bdf8;
  padding: 8px 20px;
  border-radius: 100px;
  font-size: 16px;
  letter-spacing: 2px;
}
.url {
  color: #4a6070;
  font-size: 18px;
  letter-spacing: 3px;
}
</style>
</head>
<body>
<div class="bg-glow"></div>
<div class="content">
  <div class="brand">ST<span>V</span>R HANDS</div>
  <div class="tagline">Shoot Today. Viral Tomorrow.</div>
  <div class="pills">
    <span class="pill">HYDERABAD</span>
    <span class="pill">VIZAG</span>
    <span class="pill">VIJAYAWADA</span>
    <span class="pill">RAJAHMUNDRY</span>
  </div>
  <div class="url">www.stvrhands.com</div>
</div>
</body>
</html>
